Name: auth.rpc
ListenOn: 0.0.0.0:8080
Consul:
  Host: host.docker.internal:8500
  Key: auth.rpc

IdentityRpc:
  Target: consul://host.docker.internal:8500/identity.rpc?wait=14s

BizRedis:
  Host: host.docker.internal:6379
  Pass: "redis"
  DB: 0

JwtAuth:
  AccessSecret: zephyr-admin-secret-key-2026
  AccessExpire: 86400


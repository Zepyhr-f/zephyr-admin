version: "3.9"

services:
  # ------------------------------
  # PostgreSQL
  # ------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pgsql-pgvector
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 256m
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - ${DATA_DIR}/pgsql/data:/var/lib/postgresql/data
      - ./pgsql:/docker-entrypoint-initdb.d
    command:
      - postgres
      - -c
      - "listen_addresses=*"
      - -c
      - max_connections=30
      - -c
      - shared_buffers=64MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - effective_cache_size=128MB
      - -c
      - max_wal_size=256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # ------------------------------
  # Redis
  # ------------------------------
  redis:
    image: redis:7.2
    container_name: redis
    restart: always
    mem_limit: 128m
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--bind", "0.0.0.0"]
    ports:
      - "6379:6379"
    volumes:
      - ${DATA_DIR}/redis/data:/data

  # ------------------------------
  # NATS
  # ------------------------------
  nats:
    image: nats:2.10-alpine
    container_name: opsdock-nats
    restart: always
    mem_limit: 128m
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - ${DATA_DIR}/nats/data:/data
    command:
      - "--name"
      - "nats"
      - "--jetstream"
      - "--store_dir"
      - "/data"
      - "--http_port"
      - "8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ------------------------------
  # Consul
  # ------------------------------
  consul:
    image: hashicorp/consul:1.18
    container_name: consul
    restart: always
    mem_limit: 256m
    environment:
      CONSUL_BIND_INTERFACE: eth0
    ports:
      - "${CONSUL_HTTP_PORT:-8500}:8500"
      - "${CONSUL_DNS_PORT:-8600}:8600/udp"
      - "${CONSUL_DNS_PORT:-8600}:8600/tcp"
    volumes:
      - ${DATA_DIR}/consul/data:/consul/data
    command:
      - agent
      - -server
      - -bootstrap-expect=1
      - -ui
      - -client=0.0.0.0
      - -data-dir=/consul/data
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ------------------------------
  # Nginx
  # ------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: always
    mem_limit: 64m
    depends_on:
      - consul
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ${DATA_DIR}/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DATA_DIR}/nginx/html:/usr/share/nginx/html:ro

networks:
  default:
    name: opsdock_default
    driver: bridge

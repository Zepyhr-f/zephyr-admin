services:
  backend:
    build:
      context: .
      dockerfile: zephyr-admin/admin-boot/Dockerfile
    container_name: zephyr-backend
    restart: always
    ports:
      - "8072:8072"
      - "8073:8073"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://81.70.160.181:3307/zephyr_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true
      SPRING_DATASOURCE_USERNAME: zephyr
      SPRING_DATASOURCE_PASSWORD: "Zr#db#0830"
      SPRING_DATA_REDIS_HOST: 81.70.160.181
      SPRING_DATA_REDIS_PORT: 6380
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: 81.70.160.181:8849
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: 81.70.160.181:8849
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: nacos
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: nacos
      SPRING_CLOUD_NACOS_CONFIG_USERNAME: nacos
      SPRING_CLOUD_NACOS_CONFIG_PASSWORD: nacos
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8073 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  gateway:
    build:
      context: .
      dockerfile: zephyr-gateway/Dockerfile
    container_name: zephyr-gateway
    restart: always
    ports:
      - "8001:8001"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: 81.70.160.181:8849
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: 81.70.160.181:8849
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: nacos
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: nacos
      SPRING_CLOUD_NACOS_CONFIG_USERNAME: nacos
      SPRING_CLOUD_NACOS_CONFIG_PASSWORD: nacos
      SPRING_DATA_REDIS_HOST: 81.70.160.181
      SPRING_DATA_REDIS_PORT: 6380
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s